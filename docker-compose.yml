services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: hr-seller-endpoints
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - PYTHONUNBUFFERED=1
      - APP_PORT=${APP_PORT}

    ports:
      - "127.0.0.1:${APP_PORT:-8000}:${APP_PORT:-8000}"

    depends_on:
      db:
        condition: service_healthy

    networks:
      - backend-net
      - hr_shared_net

    volumes:
      - app-logs:/app/logs

    healthcheck:
      test: [
        "CMD",
        "python",
        "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: hr-seller-db
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - backend-net

    expose:
      - "5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
    driver: local
  app-logs:
    driver: local

networks:
  backend-net:
    driver: bridge
  hr_shared_net:
    external: true