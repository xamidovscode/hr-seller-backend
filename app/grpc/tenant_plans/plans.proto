syntax = "proto3";
package plans;


service TenantPlanService {
    rpc GetTenantActivePlan (GetTenantActivePlanRequest) returns (GetTenantActivePlansResponse);
}

message GetTenantActivePlanRequest {
    int32 tenant_id = 1;
}


message ActivePlanResponse {
  int32 id = 1;
  string date = 2;
  bool is_active = 3;
  double plan_price = 4;
  int32 users_count = 5;
  double per_user_price = 6;
  string module = 7;
  bool is_per_user = 8;
  int32 trial_users = 9;
  int32 plan = 10;
  int32 tenant = 11;
  int32 current_users_count = 12;
}

message GetTenantActivePlansResponse {
    repeated ActivePlanResponse active_plans = 1;
}
